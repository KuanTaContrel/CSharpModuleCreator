<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chrome 內建 AI 測試</title>
    <style>
        body { font-family: sans-serif; padding: 20px; max-width: 600px; }
        #responseArea { margin-top: 15px; padding: 15px; background: #f0f0f0; border-radius: 8px; min-height: 50px; }
    </style>
</head>
<body>
    <h2>免費本地 AI (Gemini Nano)</h2>
    <input type="text" id="userInput" placeholder="請輸入問題..." style="width: 70%; padding: 8px;">
    <button onclick="askAI()" style="padding: 8px 15px;">發送</button>
    
    <div id="responseArea">等待提問中...</div>

    <script>
        let aiSession = null;

        async function initAI() {
            if (!window.ai || !window.ai.languageModel) {
                document.getElementById('responseArea').innerText = '你的瀏覽器不支援 Chrome 內建 AI。請確認版本及 Flags 設定。';
                return;
            }
            // 只在第一次建立 Session，後續重複使用以保留對話記憶
            aiSession = await window.ai.languageModel.create();
        }

        async function askAI() {
		
			// 執行函數
			// runLocalAI();
			
            const input = document.getElementById('userInput').value;
            const responseArea = document.getElementById('responseArea');
            
            if (!input) return;
            responseArea.innerText = 'AI 思考中...';

            try {
                if (!aiSession) await initAI();
                
                // 這裡示範使用 Streaming (串流) 的方式，讓文字像打字機一樣逐字出現
                const stream = await aiSession.promptStreaming(input);
                responseArea.innerText = '';
                
                for await (const chunk of stream) {
                    responseArea.innerText = chunk; // chunk 是目前為止累積的文字
                }
            } catch (error) {
                responseArea.innerText = '發生錯誤：' + error.message;
            }
        }
		
		async function runLocalAI() {
			// 1. 檢查瀏覽器是否支援，以及模型是否已經下載完畢
			const capabilities = await window.ai.languageModel.capabilities();
			
			if (capabilities.available === 'no') {
				console.error("很抱歉，你的瀏覽器不支援，或尚未開啟 Prompt API。");
				return;
			}

			console.log("模型準備就緒，正在建立 AI 會話...");

			// 2. 建立 AI 會話 (可以設定系統提示詞來定義 AI 的角色)
			const session = await window.ai.languageModel.create({
				systemPrompt: "你是一個專業的程式助手，請用繁體中文簡短回答，不需要過多解釋。"
			});

			// 3. 發送問題並等待回應
			const question = "請用一句話解釋什麼是 JavaScript？";
			console.log(`發問: ${question}`);
			
			// prompt() 會等待完整回覆產生才回傳
			const response = await session.prompt(question);
			
			console.log(`AI 回答: ${response}`);

			// 4. (選用) 如果這個對話用完了，可以手動銷毀來釋放記憶體
			session.destroy();
		}

    </script>
</body>
</html>
